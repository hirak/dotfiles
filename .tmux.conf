# .tmux.conf
# @Author: Hiraku NAKANO
# Migrated from .screenrc

# -------------------------------------------
# プレフィックスキー: Ctrl+j (screenと同じ)
# -------------------------------------------
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# -------------------------------------------
# 基本設定
# -------------------------------------------
# 256色対応
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# スクロールバックバッファ (screenの defscrollback 100000 相当)
set -g history-limit 100000

# ベル設定 (screenの vbell off 相当)
set -g visual-bell off
set -g bell-action none

# ウィンドウ番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウタイトルを自動更新 (screenの shelltitle 相当)
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string "#I: #W"

# Escキーの遅延をなくす
set -sg escape-time 0

# マウス有効化
set -g mouse on

# -------------------------------------------
# ステータスライン (screenの caption/hardstatus 相当)
# -------------------------------------------
set -g status on
set -g status-interval 1
set -g status-position bottom

# 色設定
set -g status-style "fg=white,bg=colour234"
set -g message-style "fg=white,bg=red,bold"

# 左側: 空
set -g status-left ""
set -g status-left-length 32

# 右側: 日時表示
set -g status-right "#[fg=colour245]#H #[fg=colour39]%Y/%m/%d %H:%M"
set -g status-right-length 50

# ウィンドウリスト (screenの caption 相当)
set -g window-status-format "#[fg=colour245] #I:#W "
set -g window-status-current-format "#[fg=white,bg=colour39,bold] #I:#W "
set -g window-status-separator ""

# ペイン境界線
set -g pane-border-style "fg=colour245"
set -g pane-active-border-style "fg=colour39,bold"
set -g pane-border-lines heavy

# 非アクティブペインを暗くしてフォーカスを明確に
set -g window-style "bg=colour235"
set -g window-active-style "bg=terminal"

# -------------------------------------------
# キーバインド (screenと同じ操作感)
# -------------------------------------------
# n: 新規ウィンドウ (screenの bind n screen)
bind n new-window

# h: 前のウィンドウ (screenの bind C-p prev)
bind C-p previous-window

# j: 次のウィンドウ (screenの bind C-n next)
bind C-n next-window

# l: ウィンドウリスト (screenの bind l windowlist)
bind l choose-window

# screen風の追加キーバインド
bind c new-window
bind d detach-client
bind k confirm-before -p "kill-window #W? (y/n)" kill-window

# ペイン分割 (screen にはないがtmuxでは便利)
bind | split-window -h
bind - split-window -v

# 設定リロード
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
